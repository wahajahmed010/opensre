version: '3.8'

services:
  # Tempo - Distributed tracing backend
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # tempo http
      - "4317"        # otlp grpc
      - "4318"        # otlp http
    networks:
      - grafana

  # Loki - Log aggregation system
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - grafana

  # Mimir - Metrics storage (Prometheus-compatible)
  mimir:
    image: grafana/mimir:latest
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./mimir-config.yaml:/etc/mimir.yaml
      - mimir-data:/data
    ports:
      - "9009:9009"
    networks:
      - grafana

  # Alloy - OpenTelemetry collector
  alloy:
    image: grafana/alloy:latest
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    volumes:
      - ./alloy_config/config-local.alloy:/etc/alloy/config.alloy
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "12345:12345"  # Alloy UI
    environment:
      - TEMPO_ENDPOINT=http://tempo:4317
      - LOKI_ENDPOINT=http://loki:3100/loki/api/v1/push
      - MIMIR_ENDPOINT=http://mimir:9009/api/v1/push
    depends_on:
      - tempo
      - loki
      - mimir
    networks:
      - grafana

  # Grafana - Observability UI
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - loki
      - mimir
    networks:
      - grafana

volumes:
  tempo-data:
  loki-data:
  mimir-data:
  grafana-data:

networks:
  grafana:
    driver: bridge
