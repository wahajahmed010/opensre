name: Update Contributors

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and sort contributors (earliest first, no bots)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import re

          headers = {
              "Authorization": "token ${{ secrets.GITHUB_TOKEN }}",
              "Accept": "application/vnd.github.v3+json",
              "User-Agent": "contributors-workflow"
          }

          BOT_LOGINS = {"dependabot", "dependabot[bot]", "github-actions", "github-actions[bot]", "copilot", "copilot[bot]"}

          # Fetch all contributors
          contributors = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/${{ github.repository }}/contributors?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              if not data:
                  break
              # Filter out bots by type and known bot usernames
              for c in data:
                  if c.get("type") == "Bot":
                      continue
                  if c["login"].lower() in BOT_LOGINS:
                      continue
                  contributors.append(c)
              page += 1

          # For each contributor, find their first commit date by paginating to the last page
          def get_first_commit_date(login):
              # GitHub API returns commits newest-first, so we need the last page
              url = f"https://api.github.com/repos/${{ github.repository }}/commits?author={login}&per_page=100"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      link_header = resp.headers.get("Link", "")
                      data = json.loads(resp.read())
                  # If there's a last page, fetch it
                  last_url = None
                  for part in link_header.split(","):
                      if 'rel="last"' in part:
                          last_url = part.split(";")[0].strip().strip("<>")
                          break
                  if last_url:
                      req2 = urllib.request.Request(last_url, headers=headers)
                      with urllib.request.urlopen(req2) as resp2:
                          data = json.loads(resp2.read())
                  if data:
                      return data[-1]["commit"]["author"]["date"]
              except:
                  pass
              return ""

          for c in contributors:
              c["first_commit"] = get_first_commit_date(c["login"])

          # Sort by first commit date descending (newest contributor first)
          contributors.sort(key=lambda c: c["first_commit"], reverse=True)

          # Build the table HTML (6 columns per row)
          cols = 6
          rows = [contributors[i:i+cols] for i in range(0, len(contributors), cols)]
          lines = ["<table>", "\t<tbody>"]
          for row in rows:
              lines.append("\t\t<tr>")
              for c in row:
                  lines.append(f"""            <td align="center">
                  <a href="{c['html_url']}">
                      <img src="{c['avatar_url']}" width="100;" alt="{c['login']}"/>
                      <br />
                      <sub><b>{c['login']}</b></sub>
                  </a>
              </td>""")
              lines.append("\t\t</tr>")
          lines.append("\t</tbody>")
          lines.append("</table>")
          table = "\n".join(lines)

          # Replace the section in README.md
          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- readme: contributors -start -->.*?<!-- readme: contributors -end -->",
              f"<!-- readme: contributors -start -->\n{table}\n<!-- readme: contributors -end -->",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Updated {len(contributors)} human contributors, earliest first.")
          EOF

      - name: Commit changes
        run: |
          git config user.name "contrib-readme-action"
          git config user.email "contrib-readme-action@noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs(contributor): contrib-readme-action has updated readme"
          git push
