# Grafana Account Configurations
#
# This file contains Grafana Cloud account configurations for querying
# logs, traces, and metrics. Each account can belong to a different customer.
#
# IMPORTANT: Do NOT commit real tokens to this file.
# In production, tokens should be fetched from a secure secrets manager.
# This file defines the structure; actual tokens are loaded from:
# - Environment variables (for CI/local dev)
# - AWS Secrets Manager (for production)
#
# Account identifier naming convention:
#   {org}-{environment}  e.g., "tracerbio-prod", "customer1-prod"

accounts:
  # Default account for tracer.bio development/testing
  tracerbio:
    instance_url: "https://tracerbio.grafana.net"
    # Token loaded from GRAFANA_READ_TOKEN env var or secrets manager
    read_token_env: "GRAFANA_READ_TOKEN"
    datasources:
      loki: "grafanacloud-logs"
      tempo: "grafanacloud-traces"
      mimir: "grafanacloud-prom"
    description: "Tracer.bio main Grafana Cloud account"
  # Example customer account (template)
  # customer1:
  #   instance_url: "https://customer1.grafana.net"
  #   read_token_env: "GRAFANA_CUSTOMER1_READ_TOKEN"
  #   datasources:
  #     loki: "grafanacloud-logs"
  #     tempo: "grafanacloud-traces"
  #     mimir: "grafanacloud-prom"
  #   description: "Customer 1 Grafana Cloud account"

  # Default account to use when no specific account is specified
default_account: "tracerbio"
